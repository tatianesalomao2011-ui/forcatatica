<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Força Tática</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background-overlay"></div>

<div class="register-container">

<div class="register-card">

<h1>Registro de Integrante</h1>

<form action="/registrar" method="POST">

<div class="input-group">

<label>Nome Completo</label>

<input
type="text"
name="nome"
required
>

</div>

<div class="input-group">

<label>RGPM</label>

<input
type="text"
name="rgpm"
required
>

</div>

<div class="input-group">

<label>ID Discord</label>

<input
type="text"
name="discord"
required
>

</div>

<div class="input-group">

<label>Patente</label>

<select name="patente">

{% for patente in patentes %}

<option value="{{ patente }}">

{{ patente }}

</option>

{% endfor %}

</select>

</div>

<div class="input-group">

<label>Senha</label>

<input
type="password"
name="senha"
required
>

</div>

<div class="input-group">

<label>Confirmar Senha</label>

<input
type="password"
name="confirmar"
required
>

</div>

<button
class="btn-login"
type="submit">

REGISTRAR

</button>

</form>

<a class="voltar-link" href="/">

Voltar ao Login

</a>

</div>

</div>

</body>
</html>
