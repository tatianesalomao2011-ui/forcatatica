<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Curso — Força Tática</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Menu Lateral de Comando Oficial -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>FORÇA TÁTICA</h2>
        </div>
        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/membros">Gerenciar Membros</a></li>
            <li><a href="/advertencias">Advertências</a></li>
            <li><a href="/certificados">Certificados</a></li>
            <li><a href="/cursos">Cursos</a></li>
            <li><a href="/novo_curso">Criar Curso</a></li>
            <li><a href="/pendentes">Pendentes</a></li>
            <li><a href="/logout">Sair</a></li>
        </ul>
    </div>

    <!-- Conteúdo Principal Alinhado -->
    <div class="main-content">
        <div class="header">
            <h1>Criar Novo Curso</h1>
            <p>Instruções e Especializações da Companhia</p>
        </div>

        <form action="/criar_curso" method="POST">
            <div class="form-card">
                
                <div class="input-group">
                    <label>Nome do Curso</label>
                    <input type="text" name="nome" placeholder="Ex: Patrulhamento Tático Motorizado" required>
                </div>

                <div class="input-group">
                    <label>Descrição Operacional</label>
                    <textarea name="descricao" placeholder="Descreva os objetivos e módulos do curso..." required></textarea>
                </div>

                <div class="input-group">
                    <label>Data de Início</label>
                    <input type="date" name="inicio" required>
                </div>

                <div class="input-group">
                    <label>Data de Término</label>
                    <input type="date" name="fim" required>
                </div>

                <button class="btn-login" type="submit" style="margin-top: 10px;">
                    Publicar Curso
                </button>
                
            </div>
        </form>
    </div>

</body>
</html>
