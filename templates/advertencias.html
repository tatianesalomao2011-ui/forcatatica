<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advertências</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="sidebar">

    <div class="sidebar-header">
        <h2>FORÇA TÁTICA</h2>
    </div>

    <ul>

        <li><a href="/dashboard">Dashboard</a></li>

        <li><a href="/membros">Membros</a></li>

        <li><a href="/advertencias">Advertências</a></li>

        <li><a href="/certificados">Certificados</a></li>

        <li><a href="/cursos">Cursos</a></li>

        <li><a href="/pendentes">Pendentes</a></li>

        <li><a href="/logout">Sair</a></li>

    </ul>

</div>

<div class="main-content">

<h1>Aplicar Advertência</h1>

<form action="/aplicar_advertencia" method="POST">

<div class="form-card">

<label>Membro</label>

<select name="usuario_id" required>

{% for usuario in usuarios %}

<option value="{{ usuario[0] }}">
{{ usuario[1] }} - {{ usuario[2] }}
</option>

{% endfor %}

</select>

<label>Motivo</label>

<textarea
name="motivo"
required>
</textarea>

<button
class="btn-aprovar"
type="submit">

Aplicar Advertência

</button>

</div>

</form>

<h2>Últimas Advertências</h2>

<table class="tabela">

<thead>

<tr>

<th>ID</th>
<th>Policial</th>
<th>Motivo</th>
<th>Aplicador</th>
<th>Data</th>
<th>Ação</th>

</tr>

</thead>

<tbody>

{% for a in advertencias %}

<tr>

<td>{{ a[0] }}</td>

<td>{{ a[5] }}</td>

<td>{{ a[2] }}</td>

<td>{{ a[3] }}</td>

<td>{{ a[4] }}</td>

<td>

<form
action="/remover_advertencia/{{ a[0] }}"
method="POST">

<button
class="btn-recusar">

Remover

</button>

</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
